name: Rodar Bot de Vagas

on:
  schedule:
    # Isso faz o bot rodar a cada 6 horas (formato cron)
    - cron: '0 */1 * * *' 
  workflow_dispatch: # Permite que você rode manualmente pelo botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install -r requirements.txt

      - name: Rodar o Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAMTOKEN }}
          CHAT_ID: ${{ secrets.CHATID }}
        run: python bot.py

      - name: Salvar progresso (Git Commit)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add vagas_enviadas.txt
          git commit -m "Atualizando vagas enviadas" || echo "Sem mudanças"
          git push