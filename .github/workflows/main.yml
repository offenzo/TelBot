name: Rodar Bot de Vagas

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

# Impede que duas instâncias do bot rodem ao mesmo tempo e causem erro de Git
concurrency:
  group: bot-vagas
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão para o bot salvar o arquivo .txt

    steps:
      - name: Baixar código do repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Baixa todo o histórico para evitar erros de merge

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install -r requirements.txt

      - name: Rodar o Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAMTOKEN }}
          CHAT_ID: ${{ secrets.CHATID }}
        run: python bot.py

      - name: Salvar progresso (Git Commit)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Tenta baixar mudanças que aconteceram enquanto o bot rodava
          git pull origin main --rebase 
          
          git add vagas_enviadas.txt
          git commit -m "Atualizando vagas enviadas" || echo "Sem mudanças"
          git push origin main